<section class="section contact" id="contact">
    <div class="section-head reveal">
        <span class="section-kicker">Say hello</span>
        <h2 class="section-title">Contact</h2>
        <span class="section-line"></span>
    </div>

    <div class="contact-grid">
        <div class="contact-info reveal">
            <p class="contact-lead">Love to share knowledge and always willing to learn more. Let's have a chat!</p>
            <ul class="contact-list">
                <li><span class="contact-ic"><i class="fa-solid fa-user"></i></span> Sanyam Jain</li>
                <li><span class="contact-ic"><i class="fa-solid fa-envelope"></i></span>
                    <a href="mailto:sanyamjain334@gmail.com">sanyamjain334@gmail.com</a>
                </li>
                <li><span class="contact-ic"><i class="fa-solid fa-location-dot"></i></span> Ahmedabad, Gujarat, India
                </li>
            </ul>
            <div class="contact-social">
                <a href="mailto:sanyamjain334@gmail.com" aria-label="Email"><i class="fa-regular fa-envelope"></i></a>
                <a href="https://github.com/Sanyam-Jain16" target="_blank" rel="noopener" aria-label="GitHub"><i
                        class="fa-brands fa-github"></i></a>
                <a href="https://www.instagram.com/the.sanyam_jain" target="_blank" rel="noopener"
                    aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="http://www.linkedin.com/in/dev-sanyam" target="_blank" rel="noopener" aria-label="LinkedIn"><i
                        class="fa-brands fa-linkedin-in"></i></a>
            </div>
        </div>

        <form class="glass-card contact-form reveal" action="https://formspree.io/f/xjkynzpr" method="POST">
            <div class="form-row">
                <div class="field">
                    <input type="text" name="name" required placeholder=" ">
                    <label>Your Name</label>
                </div>
                <div class="field">
                    <input type="email" name="email" required placeholder=" ">
                    <label>Your Email</label>
                </div>
            </div>
            <div class="field">
                <input type="text" name="subject" placeholder=" ">
                <label>Subject</label>
            </div>
            <div class="field">
                <textarea name="message" rows="5" required placeholder=" "></textarea>
                <label>Message</label>
            </div>
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
        </form>
    </div>
</section>
